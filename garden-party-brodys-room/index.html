<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Garden Party — Brodys Room — AR</title>
<style>
  :root { --accent: #e0a458; --ink: #f3ede4; }
  * { box-sizing: border-box; }
  html { background: #000; }
  body { margin: 0; height: 100%; background: transparent; color: var(--ink); font: 16px/1.5 -apple-system, "Segoe UI", sans-serif; overflow: hidden; }
  html { height: 100%; }
  #container { width: 100%; height: 100%; position: absolute; inset: 0; }
  .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 28px; z-index: 10; background: rgba(8,6,4,.92); }
  .overlay img.art { max-width: 62vw; max-height: 34vh; border-radius: 10px; box-shadow: 0 8px 40px rgba(0,0,0,.6); margin-bottom: 18px; }
  .overlay h1 { font-size: 22px; margin: 0 0 6px; }
  .overlay p { color: #b8ac9b; margin: 0 0 22px; max-width: 340px; }
  .overlay button { padding: 16px 40px; font-size: 18px; font-weight: 700; border: 0; border-radius: 30px; background: var(--accent); color: #241a0d; }
  #scanning { display: none; background: transparent; pointer-events: none; justify-content: flex-end; padding-bottom: 12vh; }
  #scanning .pill { background: rgba(8,6,4,.72); border-radius: 24px; padding: 10px 20px; display: flex; align-items: center; gap: 10px; }
  #scanning img { width: 34px; height: 34px; object-fit: cover; border-radius: 6px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100% { opacity: .35; transform: scale(.85);} 50% { opacity: 1; transform: scale(1.15);} }
  #err { display: none; }
  #err p { color: #e8a49b; }
  #soundBtn { position: absolute; top: max(14px, env(safe-area-inset-top)); right: 14px; z-index: 20; display: none; background: rgba(8,6,4,.72); color: var(--ink); border: 1px solid #4a3a24; border-radius: 22px; padding: 9px 16px; font-size: 15px; }
</style>
</head>
<body>
<div id="container"></div>
<button id="soundBtn">🔇 Sound off</button>

<div class="overlay" id="startOverlay">
  <img class="art" id="startArt" alt="">
  <h1 id="startName"></h1>
  <p>Allow camera access, then point your phone at the artwork.</p>
  <button id="startBtn">Start the magic ✨</button>
</div>

<div class="overlay" id="scanning">
  <div class="pill"><span class="dot"></span><span>Find the artwork</span><img id="scanArt" alt=""></div>
</div>

<div class="overlay" id="err">
  <h1>Hmm, that didn't work</h1>
  <p id="errMsg"></p>
  <button onclick="location.reload()">Try again</button>
</div>

<script type="importmap">
{ "imports": {
    "three": "../vendor/three.module.js",
    "three/addons/renderers/CSS3DRenderer.js": "../vendor/addons/renderers/CSS3DRenderer.js",
    "mindar-image-three": "../vendor/mindar-image-three.prod.js"
} }
</script>
<script type="module">
import * as THREE from 'three';
import { MindARThree } from 'mindar-image-three';

const cfg = {"name":"Garden Party — Brodys Room","created":"2026-07-10T20:35:52.345Z","targetAspect":0.6666666666666666,"videoAspect":0.6666666666666666,"videoFile":"video.mov","artworkFile":"artwork.jpg","scale":1,"sound":true,"pauseOnLost":true,"featurePoints":36,"publicURL":"https://chandlerblocker.github.io/ar-art-gallery/garden-party-brodys-room/"};

const $ = (id) => document.getElementById(id);
const fail = (msg) => {
  document.querySelectorAll('.overlay').forEach((o) => (o.style.display = 'none'));
  $('errMsg').textContent = msg;
  $('err').style.display = 'flex';
};

async function main() {
  $('startName').textContent = cfg.name;
  $('startArt').src = cfg.artworkFile;
  $('scanArt').src = cfg.artworkFile;

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    return fail('This browser blocks the camera. Try opening the link in Safari (iPhone) or Chrome (Android).');
  }

  const video = document.createElement('video');
  video.src = cfg.videoFile;
  video.loop = true;
  video.muted = true;
  video.playsInline = true;
  video.setAttribute('playsinline', '');
  video.setAttribute('webkit-playsinline', '');
  video.crossOrigin = 'anonymous';
  video.preload = 'auto';

  const mindarThree = new MindARThree({
    container: $('container'),
    imageTargetSrc: 'targets.mind',
    uiScanning: 'no',
    uiLoading: 'no',
    uiError: 'no',
    filterMinCF: 0.0001,
    filterBeta: 0.002,
    missTolerance: 8,
    warmupTolerance: 2,
  });
  const { renderer, scene, camera } = mindarThree;

  const anchor = mindarThree.addAnchor(0);
  const texture = new THREE.VideoTexture(video);
  texture.colorSpace = THREE.SRGBColorSpace;
  const aspect = cfg.videoAspect || cfg.targetAspect || 1;
  const scale = cfg.scale || 1;
  const geometry = new THREE.PlaneGeometry(scale, scale * aspect);
  const material = new THREE.MeshBasicMaterial({ map: texture, transparent: true, opacity: 0 });
  const plane = new THREE.Mesh(geometry, material);
  anchor.group.add(plane);

  let visible = false;
  anchor.onTargetFound = () => {
    visible = true;
    video.play().catch(() => {});
    $('scanning').style.display = 'none';
  };
  anchor.onTargetLost = () => {
    visible = false;
    if (cfg.pauseOnLost !== false) video.pause();
    $('scanning').style.display = 'flex';
  };

  const soundBtn = $('soundBtn');
  if (cfg.sound) {
    soundBtn.style.display = 'block';
    soundBtn.addEventListener('click', () => {
      video.muted = !video.muted;
      soundBtn.textContent = video.muted ? '🔇 Sound off' : '🔊 Sound on';
      if (!video.muted && visible) video.play().catch(() => {});
    });
  }

  $('startBtn').addEventListener('click', async () => {
    $('startBtn').disabled = true;
    $('startBtn').textContent = 'Starting camera…';
    try {
      video.play().then(() => video.pause()).catch(() => {});
      await mindarThree.start();
    } catch (e) {
      console.error(e);
      return fail(
        /denied|permission|NotAllowed/i.test(String(e))
          ? 'Camera permission was denied. Allow the camera for this site in your browser settings, then reload.'
          : 'Could not start the camera: ' + (e.message || e)
      );
    }
    // MindAR puts the camera feed at z-index -2, where page backgrounds
    // paint over it; lift it and stack the render canvases above it.
    mindarThree.video.style.zIndex = '0';
    renderer.domElement.style.zIndex = '1';
    mindarThree.cssRenderer.domElement.style.zIndex = '2';

    $('startOverlay').style.display = 'none';
    $('scanning').style.display = 'flex';

    renderer.setAnimationLoop(() => {
      material.opacity = Math.max(0, Math.min(1, material.opacity + (visible ? 0.12 : -0.25)));
      renderer.render(scene, camera);
    });
  });
}

main().catch((e) => { console.error(e); fail('Unexpected error: ' + (e.message || e)); });
</script>
</body>
</html>
